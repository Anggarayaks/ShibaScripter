<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin ShibaScripter</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        #login-box, #admin-box { background: #1f1f1f; padding: 20px; border-radius: 10px; width: 300px; }
        #admin-box { display: none; } /* Tersembunyi sampai login berhasil */
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Form Login -->
    <div id="login-box">
        <h2>Login Admin</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pw" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>

    <!-- Form Input Data (Muncul setelah login) -->
    <div id="admin-box">
        <h2>Tambah Script</h2>
        <input type="text" id="title" placeholder="Judul Script">
        <input type="text" id="desc" placeholder="Deskripsi">
        <input type="text" id="img" placeholder="Link Gambar">
        <button onclick="submitData()">Simpan ke Database</button>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value;
            const pw = document.getElementById('pw').value;

            if (email === 'admin@gmail.com' && pw === 'admin123') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-box').style.display = 'block';
            } else {
                alert('Email atau Password salah!');
            }
        }

        async function submitData() {
            const dataBaru = {
                id: Date.now(), // ID unik berdasarkan waktu
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                image_url: document.getElementById('img').value,
                category: "Roblox",
                tags: ["roblox"],
                status: "working",
                views: 0,
                likes: 0,
                last_updated: new Date().toISOString().split('T')[0]
            };

            const response = await fetch('/api/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ dataBaru })
            });
            
            const result = await response.json();
            alert(result.message);
        }
    </script>
</body>
</html>
